<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>йјҺе…Ҷе…ғе®ҝиҲҚеҗҲзҙ„зі»зөұ</title>
<style>
  :root{
    --ink:#1c1a19; --muted:#6f665f; --line:#e2dbd4; --bg:#f7f4f1; --card:#fff;
    --brand:#c8402c; --ok:#2f6b3a; --warn-bg:#fff8e6; --warn-fg:#7a6320;
    --shadow:0 1px 3px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Helvetica Neue",sans-serif;
    line-height:1.7;font-size:15px}
  .wrap{max-width:980px;margin:0 auto;padding:28px 20px 80px}
  header{display:flex;align-items:baseline;gap:14px;margin-bottom:22px}
  h1{font-size:21px;margin:0}
  .sub{font-size:12.5px;color:var(--muted)}
  h2{font-size:16px;margin:0 0 12px}
  section{background:var(--card);border-radius:10px;padding:20px 22px;
    margin-bottom:18px;box-shadow:var(--shadow)}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;
    font-size:14.5px;font-family:inherit;background:var(--bg)}
  input:focus,select:focus{outline:2px solid var(--brand);outline-offset:-1px}
  .row3{grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}

  button{border:none;border-radius:8px;padding:11px 20px;font-size:14.5px;
    font-weight:600;cursor:pointer;font-family:inherit}
  .primary{background:var(--brand);color:#fff}
  .ghost{background:var(--bg);color:var(--ink);border:1px solid var(--line)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .actions{margin-top:16px;display:flex;gap:10px;align-items:center}
  .msg{font-size:13.5px}
  .msg.ok{color:var(--ok)} .msg.err{color:var(--brand)}

  .result{background:#f2f7f2;border:1px solid #cfe3cf;border-radius:8px;
    padding:14px 16px;margin-top:14px;font-size:14px;display:none}
  .result code{background:#fff;padding:4px 8px;border-radius:5px;font-size:12.5px;
    word-break:break-all;display:block;margin:8px 0}

  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th,td{border-bottom:1px solid var(--line);padding:8px 9px;text-align:left;white-space:nowrap}
  th{font-size:11.5px;color:var(--muted);font-weight:600}
  .scroll{overflow-x:auto}
  .st{display:inline-block;padding:1px 9px;border-radius:99px;font-size:12px}
  .st.еҫ…з°Ҫ{background:var(--warn-bg);color:var(--warn-fg)}
  .st.еңЁдҪҸ{background:#f2f7f2;color:var(--ok)}
  .st.е·ІйҖҖе®ҝ{background:#eee;color:#777}
  .due{color:var(--brand);font-weight:600}
  td .mini{font-size:12px;padding:5px 10px;margin-right:4px}
  #login{max-width:360px;margin:80px auto}
</style>
</head>
<body>
<div class="wrap" id="app">
  <section id="login">
    <div style="display:flex;justify-content:center;gap:14px;margin-bottom:14px">
      <img src="assets/logo-mala.jpg" alt="йә»зҡ„е°ҸиҫӣиҫЈ" style="height:52px;border-radius:6px">
      <img src="assets/logo-mozhu.jpg" alt="еўЁз«№дәӯ" style="height:52px;border-radius:6px">
    </div>
    <h2 style="text-align:center">йјҺе…Ҷе…ғе®ҝиҲҚеҗҲзҙ„зі»зөұ</h2>
    <p style="text-align:center;font-size:12.5px;color:var(--muted);margin:-6px 0 14px">з®ЎзҗҶеҫҢеҸ°</p>
    <label>з®ЎзҗҶйҖҡиЎҢзўј</label>
    <input type="password" id="pass" autocomplete="current-password">
    <div class="actions">
      <button class="primary" id="loginBtn">йҖІе…Ҙ</button>
      <span class="msg err" id="loginMsg"></span>
    </div>
  </section>

  <div id="main" style="display:none">
    <header>
      <img src="assets/logo-mala.jpg" alt="йә»зҡ„е°ҸиҫӣиҫЈ" style="height:38px;border-radius:5px;align-self:center">
      <img src="assets/logo-mozhu.jpg" alt="еўЁз«№дәӯ" style="height:38px;border-radius:5px;align-self:center">
      <h1>йјҺе…Ҷе…ғе®ҝиҲҚеҗҲзҙ„зі»зөұ</h1>
      <span class="sub">з®ЎзҗҶеҫҢеҸ°пҪңж–°з«№еёӮе…үеҫ©и·ҜдёҖж®ө435иҷҹ</span>
    </header>

    <section>
      <h2>е»әз«ӢеҗҲзҙ„е–®</h2>
      <div class="grid">
        <div><label>жүҝз§ҹдәәе§“еҗҚ *</label><input id="f_name"></div>
        <div><label>йҖҡиЁҠең°еқҖпјҲйҒёеЎ«пјҢеҗҢд»Ғз°ҪзҪІжҷӮеҸҜиҮӘеЎ«пјү</label><input id="f_mail_addr"></div>
        <div><label>жҲҝй–“ *</label><select id="f_room"></select></div>
        <div id="bedWrap" style="display:none"><label>еәҠдҪҚ *</label><select id="f_bed"></select></div>
        <div><label>жңҲз§ҹйҮ‘пјҲиҮӘеӢ•пјү</label><input id="f_rent" readonly></div>
        <div><label>з§ҹжңҹиө·ж—Ҙ *</label><input type="date" id="f_start"></div>
        <div><label>з§ҹжңҹиҝ„ж—ҘпјҲиҮӘеӢ• +6 еҖӢжңҲпјү</label><input id="f_end" readonly></div>
        <div class="row3">
          <div><label>з®ЎзҗҶиІ»</label><select id="f_mgmt"><option>з”ұеҮәз§ҹдәәиІ ж“”</option><option>з”ұжүҝз§ҹдәәиІ ж“”</option></select></div>
          <div><label>ж°ҙиІ»</label><select id="f_water"><option>з”ұеҮәз§ҹдәәиІ ж“”</option><option>з”ұжүҝз§ҹдәәиІ ж“”</option></select></div>
          <div><label>йӣ»иІ»</label><select id="f_power"><option>з”ұеҮәз§ҹдәәиІ ж“”</option><option>з”ұжүҝз§ҹдәәиІ ж“”</option></select></div>
        </div>
      </div>
      <div class="actions">
        <button class="primary" id="createBtn">е»әз«ӢдёҰз”ўз”ҹз°ҪзҪІйҖЈзөҗ</button>
        <span class="msg" id="createMsg"></span>
      </div>
      <div class="result" id="createResult"></div>
    </section>

    <section>
      <h2>еҗҲзҙ„дёҖиҰҪ <button class="ghost" id="reload" style="float:right;padding:6px 14px;font-size:13px">йҮҚж–°ж•ҙзҗҶ</button></h2>
      <div class="scroll"><table id="list">
        <thead><tr><th>з·Ёиҷҹ</th><th>е§“еҗҚ</th><th>жҲҝй–“/еәҠдҪҚ</th><th>з§ҹйҮ‘</th>
        <th>жң¬жңҹ</th><th>жңҹеҲҘ</th><th>зӢҖж…Ӣ</th><th>з°ҪзҪІ</th><th></th></tr></thead>
        <tbody></tbody>
      </table></div>
    </section>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyxyhJ35MWTjtvzKr54_9JzGfLZlclyqn2fYLWXgz0muTFzL_tu81nR1r3W332J1igm/exec';
let PASS = sessionStorage.getItem('dorm_pass') || '';
let ROOMS = [];
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

async function api(params, post) {
  const url = post ? API_URL : API_URL + '?' + new URLSearchParams(params);
  const r = await fetch(url, post ? {method:'POST', body: JSON.stringify(params)} : {});
  return r.json();
}

// в”Җв”Җ зҷ»е…Ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
$('loginBtn').onclick = async () => {
  PASS = $('pass').value.trim();
  $('loginMsg').textContent = 'зўәиӘҚдёӯвҖҰ';
  const j = await api({action:'list', pass:PASS});
  if (!j.ok) { $('loginMsg').textContent = j.error || 'йҖҡиЎҢзўјйҢҜиӘӨ'; return; }
  sessionStorage.setItem('dorm_pass', PASS);
  enter(j.contracts);
};
$('pass').addEventListener('keydown', e => { if (e.key==='Enter') $('loginBtn').click(); });

async function enter(contracts) {
  $('login').style.display = 'none';
  $('main').style.display = '';
  const j = await api({action:'rooms'});
  ROOMS = j.rooms;
  $('f_room').innerHTML = '<option value="">и«ӢйҒёж“Ү</option>' +
    ROOMS.map(r=>`<option>${esc(r.room)}</option>`).join('');
  renderList(contracts || []);
  if (!contracts) refresh();
}

// в”Җв”Җ е»әе–®иЎЁе–®йҖЈеӢ• в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
$('f_room').onchange = () => {
  const def = ROOMS.find(r=>r.room===$('f_room').value);
  if (!def) { $('bedWrap').style.display='none'; $('f_rent').value=''; return; }
  if (def.beds.length) {
    $('bedWrap').style.display='';
    $('f_bed').innerHTML = def.beds.map(b=>`<option>${esc(b)}</option>`).join('');
  } else $('bedWrap').style.display='none';
  const rate = {е–®дәәжҲҝ:3500, йӣҷдәәжҲҝ:2000, еӣӣдәәжҲҝ:1500}[def.type];
  $('f_rent').value = rate ? rate.toLocaleString() + ' е…ғ' : '';
};
$('f_start').onchange = () => {
  const v = $('f_start').value; if (!v) return;
  const d = new Date(v); d.setMonth(d.getMonth()+6); d.setDate(d.getDate()-1);
  $('f_end').value = d.toISOString().slice(0,10);
};

// в”Җв”Җ е»әз«Ӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
$('createBtn').onclick = () => createContract(false);
async function createContract(force) {
  const p = {
    action:'create', pass:PASS, force: force?1:'',
    name:$('f_name').value.trim(), mail_addr:$('f_mail_addr').value.trim(),
    room:$('f_room').value, bed: $('bedWrap').style.display==='none' ? '' : $('f_bed').value,
    term_start:$('f_start').value,
    fee_mgmt:$('f_mgmt').value, fee_water:$('f_water').value, fee_power:$('f_power').value,
  };
  for (const [k,lab] of [['name','е§“еҗҚ'],['room','жҲҝй–“'],['term_start','з§ҹжңҹиө·ж—Ҙ']])
    if (!p[k]) { $('createMsg').className='msg err'; $('createMsg').textContent='и«ӢеЎ«'+lab; return; }

  $('createBtn').disabled = true;
  $('createMsg').className='msg'; $('createMsg').textContent='е»әз«ӢдёӯвҖҰ';
  const j = await api(p, true);
  $('createBtn').disabled = false;

  if (j.warn === 'еәҠдҪҚйҮҚиӨҮ') {
    if (confirm(j.message + '\n\nпјҲдәӨжҺҘжңҹзҹӯжҡ«йҮҚз–ҠеҸҜжҢүзўәе®ҡеј·еҲ¶е»әз«Ӣпјү')) return createContract(true);
    $('createMsg').textContent=''; return;
  }
  if (!j.ok) { $('createMsg').className='msg err'; $('createMsg').textContent=j.error; return; }

  $('createMsg').className='msg ok'; $('createMsg').textContent='е·Іе»әз«Ӣ '+j.contract_id;
  const url = location.origin + location.pathname.replace(/admin\.html$/,'') + 'sign.html?t=' + j.token;
  $('createResult').style.display='block';
  $('createResult').innerHTML = `
    <strong>${esc($('f_name').value)}</strong>гҖҖ${esc(p.room)} ${esc(p.bed)}гҖҖз§ҹйҮ‘ ${j.rent.toLocaleString()} е…ғпјҸжңҲ
    <br>з§ҹжңҹ ${j.term_start} пҪһ ${j.term_end}
    <code id="signUrl">${esc(url)}</code>
    <button class="ghost" onclick="navigator.clipboard.writeText(document.getElementById('signUrl').textContent).then(()=>this.textContent='е·ІиӨҮиЈҪ вң“')">иӨҮиЈҪз°ҪзҪІйҖЈзөҗ</button>
    <span style="font-size:12.5px;color:var(--muted)">гҖҖжҠҠйҖЈзөҗеӮізөҰеҗҢд»ҒпјҲLINE жҲ–з°ЎиЁҠзҡҶеҸҜпјүпјҢй–Ӣе•ҹеҚіеҸҜз°ҪзҪІгҖӮ</span>`;
  refresh();
}

// в”Җв”Җ дёҖиҰҪиЎЁ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
$('reload').onclick = () => refresh();
async function refresh() {
  const j = await api({action:'list', pass:PASS});
  if (j.ok) renderList(j.contracts);
}
function renderList(list) {
  const tb = $('list').querySelector('tbody');
  const today = new Date(); const soon = new Date(); soon.setDate(soon.getDate()+30);
  tb.innerHTML = list.slice().reverse().map(c => {
    const end = new Date(c.term_end);
    const dueSoon = c.status==='еңЁдҪҸ' && end <= soon;
    const url = location.origin + location.pathname.replace(/admin\.html$/,'') + 'sign.html?t=' + c.token;
    return `<tr>
      <td>${esc(c.contract_id)}</td><td>${esc(c.name)}</td>
      <td>${esc(c.room)} ${esc(c.bed||'')}</td>
      <td>${Number(c.rent).toLocaleString()}</td>
      <td class="${dueSoon?'due':''}">${esc(c.term_start)}<br>пҪһ${esc(c.term_end)}${dueSoon?'пјҲ30ж—Ҙе…§еҲ°жңҹпјү':''}</td>
      <td>${String(c.term_no).indexOf('дёҚе®ҡжңҹ')===0?'дёҚе®ҡжңҹпјҲжңҲз§ҹпјү':'з¬¬ '+esc(c.term_no)+' жңҹ'}</td>
      <td><span class="st ${esc(c.status)}">${esc(c.status)}</span>${c.terminate_flag?`<div style="font-size:11px;color:var(--brand)">${esc(c.terminate_flag)}</div>`:''}</td>
      <td>${esc((c.signed_at||'').slice(0,10))}</td>
      <td>
        ${c.status==='еҫ…з°Ҫ' ? `<button class="ghost mini" onclick="navigator.clipboard.writeText('${url}').then(()=>event.target.textContent='е·ІиӨҮиЈҪ')">иӨҮиЈҪйҖЈзөҗ</button>` : ''}
        ${c.status==='еңЁдҪҸ' ? `<button class="ghost mini" onclick="openHandover('${esc(c.contract_id)}',this)">й–Ӣй»һдәӨе–®</button><button class="ghost mini" onclick="toggleTerminate('${esc(c.contract_id)}',this)">${c.terminate_flag?'еҸ–ж¶ҲзөӮжӯў':'жЁҷиЁҳзөӮжӯў'}</button>` : ''}
        ${c.pdf_id ? `<a class="ghost mini" style="text-decoration:none;padding:5px 10px;border:1px solid var(--line);border-radius:8px" target="_blank" href="https://drive.google.com/file/d/${esc(c.pdf_id)}/view">PDF</a>` : ''}
      </td></tr>`;
  }).join('');
}

async function openHandover(cid, btn) {
  btn.disabled = true; btn.textContent = 'е»әз«ӢдёӯвҖҰ';
  const j = await api({action:'handoverCreate', pass:PASS, contract_id:cid}, true);
  btn.disabled = false;
  if (!j.ok) { alert(j.error); btn.textContent='й–Ӣй»һдәӨе–®'; return; }
  await navigator.clipboard.writeText(j.url);
  btn.textContent = 'е·ІиӨҮиЈҪй»һдәӨйҖЈзөҗ';
  alert((j.reused?'йҖҷзӯҶе·ІжңүжңӘе®ҢжҲҗзҡ„й»һдәӨе–®пјҢ':'й»һдәӨе–®е·Іе»әз«ӢпјҢ')+'йҖЈзөҗе·ІиӨҮиЈҪпјҡ\n'+j.url);
}

async function toggleTerminate(cid, btn) {
  btn.disabled = true;
  const j = await api({action:'terminate', pass:PASS, contract_id:cid}, true);
  btn.disabled = false;
  if (!j.ok) { alert(j.error); return; }
  refresh();
}

// е·Ізҷ»е…ҘйҒҺе°ұзӣҙжҺҘйҖІ
if (PASS) (async()=>{ const j=await api({action:'list',pass:PASS}); if(j.ok) enter(j.contracts); else sessionStorage.removeItem('dorm_pass'); })();
</script>
</body>
</html>
